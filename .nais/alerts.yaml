---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: dp-saksbehandling-alerts
  namespace: teamdagpenger
  labels:
    team: teamdagpenger
spec:
  groups:
    - name: dp-saksbehandling-utboks
      rules:
        - alert: UtboksDrenererIkke
          expr: >-
            min_over_time(
              dp_saksbehandling_utboks_ventende_meldinger{app="dp-saksbehandling"}[10m]
            ) > 0
          for: 10m
          annotations:
            consequence: '*dp-saksbehandling* publiserer ikke ventende utboks-meldinger (FIFO står fast) — avbryt_behandling/klage/distribuering blir ikke sendt'
            action: '`kubectl logs -l app=dp-saksbehandling | grep -i utboks`. Sannsynlig poison-melding (f.eks. for stor) først i kø — fiks/fjern raden i kafka_utboks_v1'
          labels:
            namespace: teamdagpenger
            severity: critical
    - name: dp-saksbehandling-jobber
      rules:
        - alert: BakgrunnsjobbKjorerIkke
          # Appens label `job` kolliderer med Prometheus' scrape-`job` og omdøpes til
          # `exported_job` (honor_labels=false). Derfor grupperes det på exported_job.
          # last_success settes kun av lederen; started settes på alle pods ved jobbstart.
          # `last_success or started` gir alltid en serie å joine på (også for jobber som
          # aldri har lyktes), uten å forurense last_success som dashbord leser.
          # max by (exported_job) leser ferskeste verdi på tvers av pods.
          # Terskel = 2 * intervall, med gulv på 5m for jobber med svært korte intervaller (f.eks. utboks 5s).
          expr: >-
            (
              time() - max by (exported_job) (
                dp_saksbehandling_job_last_success_timestamp_seconds{app="dp-saksbehandling"}
                or
                dp_saksbehandling_job_started_timestamp_seconds{app="dp-saksbehandling"}
              )
            )
            >
            max by (exported_job) (
              clamp_min(2 * dp_saksbehandling_job_period_seconds{app="dp-saksbehandling"}, 300)
            )
          for: 10m
          annotations:
            consequence: 'Bakgrunnsjobben *{{ $labels.exported_job }}* i *dp-saksbehandling* har ikke fullført en vellykket kjøring innen 2x sitt intervall — jobben feiler vedvarende eller kjører ikke (scheduler eller leader nede)'
            action: '`kubectl logs -l app=dp-saksbehandling | grep -i {{ $labels.exported_job }}`. Sjekk siste feil i loggen; ved mistanke om leder-problem verifiser leader election'
          labels:
            namespace: teamdagpenger
            severity: warning
