---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: dp-saksbehandling-alerts
  namespace: teamdagpenger
  labels:
    team: teamdagpenger
spec:
  groups:
    - name: dp-saksbehandling-utboks
      rules:
        - alert: UtboksDrenererIkke
          expr: >-
            min_over_time(
              dp_saksbehandling_utboks_ventende_meldinger{app="dp-saksbehandling"}[10m]
            ) > 0
          for: 10m
          annotations:
            consequence: '*dp-saksbehandling* publiserer ikke ventende utboks-meldinger (FIFO står fast) — avbryt_behandling/klage/distribuering blir ikke sendt'
            action: '`kubectl logs -l app=dp-saksbehandling | grep -i utboks`. Sannsynlig poison-melding (f.eks. for stor) først i kø — fiks/fjern raden i kafka_utboks_v1'
          labels:
            namespace: teamdagpenger
            severity: critical
    - name: dp-saksbehandling-jobber
      rules:
        - alert: BakgrunnsjobbKjorerIkke
          # last_success settes kun av lederen, og period settes på alle pods.
          # Derfor max by (job) for å lese lederens ferskeste suksess på tvers av pods.
          # Terskel = 3 * intervall, med gulv på 5m for jobber med svært korte intervaller (f.eks. utboks 5s).
          expr: >-
            (
              time() - max by (job) (
                dp_saksbehandling_job_last_success_timestamp_seconds{app="dp-saksbehandling"}
              )
            )
            >
            max by (job) (
              clamp_min(3 * dp_saksbehandling_job_period_seconds{app="dp-saksbehandling"}, 300)
            )
          for: 10m
          annotations:
            consequence: 'Bakgrunnsjobben *{{ $labels.job }}* i *dp-saksbehandling* har ikke fullført en vellykket kjøring innen 3x sitt intervall — jobben feiler vedvarende eller kjører ikke (scheduler eller leader nede)'
            action: '`kubectl logs -l app=dp-saksbehandling | grep -i {{ $labels.job }}`. Sjekk siste feil i loggen; ved mistanke om leder-problem verifiser leader election'
          labels:
            namespace: teamdagpenger
            severity: warning
